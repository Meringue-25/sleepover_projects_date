<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Letter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <p>A Letter for You</p>
    </div>

    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Want to go on a date this Saturday?</h1>

        <img src="cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.png" class="yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.png" class="no-btn" alt="No" />
          </div>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          <strong>Date Idea: </strong>We watch Knives Out 2 and code hehe
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
